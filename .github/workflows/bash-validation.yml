name: Bash validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck tree

      - name: Run Bash syntax validation
        run: |
          while IFS= read -r -d '' script; do
            echo "bash -n ${script}"
            bash -n "${script}"
          done < <(find . -type f -name '*.sh' -print0 | sort -z)

      - name: Run ShellCheck
        run: |
          while IFS= read -r -d '' script; do
            echo "shellcheck ${script}"
            shellcheck "${script}"
          done < <(find . -type f -name '*.sh' -print0 | sort -z)

      - name: Verify downloader executable bit
        run: test -x scripts/download_albums.sh

      - name: Print repository tree
        run: tree -a
