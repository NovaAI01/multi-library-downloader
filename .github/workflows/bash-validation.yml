name: Bash validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg nodejs python3-mutagen shellcheck tree curl
          sudo curl --fail --location --show-error --silent \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            --output /usr/local/bin/yt-dlp
          sudo chmod 0755 /usr/local/bin/yt-dlp

      - name: Run repository validation
        run: ./scripts/validate.sh

      - name: Print system report
        run: ./scripts/system_report.sh

      - name: Print repository tree
        run: tree -a
